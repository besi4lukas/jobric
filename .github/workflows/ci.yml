name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded PR runs; let main builds run to completion.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm lint
      - run: pnpm exec prettier --check "**/*.{ts,tsx,md}"

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm check-types

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Build web
        run: pnpm turbo build --filter=@jobric/web
        env:
          # Dummy values so next build's prerender step can render <ClerkProvider>.
          # CI only verifies the bundle compiles; no real auth is performed.
          CLERK_SECRET_KEY: sk_test_ci-dummy
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_Y2xlcmsuZXhhbXBsZS5jb20k
          NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
          NEXT_PUBLIC_CLERK_SIGN_UP_URL: /sign-up
          NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: /dashboard
          NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL: /dashboard
          NEXT_PUBLIC_AGENTS_URL: https://agents.example.com
          GOOGLE_CLIENT_ID: ci-dummy-client-id
          GOOGLE_CLIENT_SECRET: ci-dummy-client-secret
          GOOGLE_OAUTH_REDIRECT_URI: http://localhost:3000/api/gmail/callback
          # base64 of 32 zero bytes — passes .min(1); never used at build time
          GMAIL_TOKEN_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=

      - name: Bundle-check agents Worker
        run: pnpm --filter=@jobric/agents exec wrangler deploy --dry-run --outdir=dist

      - name: Smoke-test D1 migrations
        run: pnpm --filter=@jobric/agents exec wrangler d1 migrations apply jobric-db --local

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm test
